<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/music-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1DB954" />
    <meta name="description" content="MySpace — 独立音乐人的在线音乐播放、原创分享与社交平台。聆听原创歌曲，探索音乐世界。" />
    <meta name="keywords" content="音乐,原创音乐,独立音乐人,在线播放,MySpace" />
    <link rel="apple-touch-icon" href="/music-icon-192.png" />

    <!-- Open Graph 社交分享标签 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MySpace — 独立音乐人的创作空间" />
    <meta property="og:description" content="聆听原创歌曲，探索音乐世界。在线音乐播放、分享与社交平台。" />
    <meta property="og:site_name" content="MySpace" />
    <meta property="og:locale" content="zh_CN" />

    <!-- 预连接外部图片 CDN — 加速首屏图片加载 -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <title>MySpace - 发现与分享音乐</title>
    <!-- 防闪烁：在 DOM 渲染前同步设置 data-theme -->
    <script>
      (function(){
        var t = localStorage.getItem('app-theme');
        if (!t) {
          // 首次访问：检测系统偏好
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          localStorage.setItem('app-theme', t);
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
